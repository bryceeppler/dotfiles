# ~/.config/starship.toml — lean prompt, GitHub Dark palette. Managed in ~/dotfiles.
# Layout:  [venv] dir on  branch <git-status> ❯
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
format = "$python$directory$git_branch$git_status$character"

# Current directory — truncated to the repo root, GitHub "blue"
[directory]
format = "[$path]($style) "
style = "#58a6ff bold"
truncate_to_repo = true
truncation_length = 3
truncation_symbol = ""

# Git branch — "on  <branch>", GitHub "purple"
[git_branch]
symbol = " "
format = "[on ](#6e7681)[$symbol$branch](#bc8cff) "
truncation_length = 20
truncation_symbol = "…"

# Git status — only shows when there's something to report (GitHub "yellow")
[git_status]
style = "#d29922"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "=${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Active Python virtualenv only (no version noise) — shows as "(.venv)"
[python]
disabled = false
symbol = ""
style = "#6e7681"
format = '[(\($virtualenv\) )]($style)'

# Prompt character — green ❯ on success, red ❯ after a failed command
[character]
success_symbol = "[❯](#3fb950)"
error_symbol = "[❯](#ff7b72)"
vimcmd_symbol = "[❮](#d29922)"
