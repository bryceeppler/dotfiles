# ~/.config/starship.toml
# Minimal prompt - just directory and git branch

"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false

# Define what shows in your prompt (and nothing else!)
format = """
$directory\
$git_branch\
$character """

# Directory - just current folder name
[directory]
# truncation_length = 2
truncate_to_repo = true
format = "[$path]($style) "
style = "red"

# Git branch - clean and simple
[git_branch]
format = "[$branch]($style) "
style = "blue"
truncation_length = 8
truncation_symbol = ""

# The prompt character
[character]
success_symbol = "[›](bold yellow)"
error_symbol = "[›](bold red)"

# Disable EVERYTHING else
[aws]
disabled = true

[azure]
disabled = true

