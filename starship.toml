# ~/.config/starship.toml — clean two-line prompt: frame + Nerd Font icons.
# Managed in ~/dotfiles. ANSI color names → the prompt follows the active
# iTerm2 color preset (GitHub Dark right now).
#
# Layout:
#   ╭─  dir   branch <status>
#   ╰─ ❯
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true   # blank line above each prompt for breathing room

format = """
[╭─](bright-black)$directory$git_branch$git_status$python
[╰─ ](bright-black)$character """

# Directory — folder icon + repo-truncated path, GitHub blue
[directory]
format = "[  $path]($style)"
style = "blue bold"
truncate_to_repo = true
truncation_length = 3
truncation_symbol = ""

# Git branch — branch icon + name, GitHub purple
[git_branch]
symbol = " "
format = "[  $symbol$branch]($style)"
style = "purple"
truncation_length = 24
truncation_symbol = "…"

# Git status — single symbols, GitHub yellow, only shows when dirty
[git_status]
style = "yellow"
format = "([ $all_status]($style))"
conflicted = "="
untracked = "?"
stashed = ""
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# Active Python virtualenv only — dim, shows as "(.venv)"
[python]
disabled = false
style = "bright-black"
format = "[ (\\($virtualenv\\))]($style)"

# Prompt character on line 2 — green ❯ ok, red ❯ failed
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"
